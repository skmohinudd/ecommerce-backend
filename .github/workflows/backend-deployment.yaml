name: Backend CI/CD to EKS

on:
  push:
    branches:
      - master
      - main
    paths:
      - "routes/**"
      - "models/**"
      - "controllers/**"
      - "server.js"
      - "logger.js"
      - "package.json"
      - "package-lock.json"
      - "Dockerfile"
      - ".dockerignore"
      - "mongodb/k8s/**"
      - "helm/**"
      - ".github/workflows/backend-deployment.yaml"
  workflow_dispatch:

permissions:
  id-token: write
  contents: read

env:
  AWS_REGION: us-east-1
  EKS_CLUSTER_NAME: eksdemo1
  ECR_REPOSITORY: backendapp
  K8S_NAMESPACE: ecommerce
  OTEL_ENABLED: "true"

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout source code
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v6
        with:
          role-to-assume: ${{ secrets.IAM_ROLE_GITHUBACTIONS }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build and push backend image
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          IMAGE_TAG: ${{ github.sha }}
        run: |
          docker build \
            -t "$ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG" \
            -t "$ECR_REGISTRY/$ECR_REPOSITORY:latest" \
            .

          docker push "$ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG"
          docker push "$ECR_REGISTRY/$ECR_REPOSITORY:latest"

      - name: Update kubeconfig
        run: |
          aws eks update-kubeconfig \
            --region "$AWS_REGION" \
            --name "$EKS_CLUSTER_NAME"

      - name: Helm lint
        run: |
          helm lint ./helm

      - name: Deploy backend with Helm
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          IMAGE_TAG: ${{ github.sha }}
        run: |
          helm upgrade --install backend ./helm \
            --namespace "$K8S_NAMESPACE" \
            --create-namespace \
            --set backend.image.repository="$ECR_REGISTRY/$ECR_REPOSITORY" \
            --set backend.image.tag="$IMAGE_TAG" \
            --set backend.otel.enabled="$OTEL_ENABLED"

      - name: Verify rollout
        run: |
          kubectl rollout status deployment/backend -n "$K8S_NAMESPACE" --timeout=180s